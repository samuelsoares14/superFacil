<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Estoque | SuperMarket</title>

  <link rel="stylesheet" href="estoque.css">
  <link rel="stylesheet" href="/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="logo">
      <h2>SuperMarket</h2>
    </div>

    <nav class="menu">

  <a href="index.html">🏠 Início</a>

  <a href="frenteCaixa.html">💳 Frente de Caixa</a>

  <a href="receitasProducao.html">📋 Receitas / Produção </a>

  <a href="produtos.html">🛒 Produtos</a>

  <a href="estoque.html">📦 Estoque</a>

  <a href="vendas.html">💰 Vendas</a>

  <a href="/cliente/clientes.html">👥 Clientes</a>

  <a href="relatorios.html">📊 Relatórios</a>

  <a href="configuracoes.html">⚙️ Configurações</a>

</nav>

  </aside>

  <!-- MAIN -->

  <main class="main-content">

    <!-- TOPBAR -->

    <header class="topbar">

      <h1>Controle de Estoque</h1>

      <button class="new-stock">
          ➕ Movimentar Estoque
      </button>

    </header>

    <!-- CARDS -->

    <section class="cards">

      <div class="card blue">

        <h3>Total Produtos</h3>

        <p id="totalProdutos">0</p>

      </div>

      <div class="card yellow">

        <h3>Estoque Baixo</h3>

        <p id="estoqueBaixo">0</p>

      </div>

      <div class="card red">

        <h3>Sem Estoque</h3>

        <p id="semEstoque">0</p>

      </div>

      <div class="card green">

        <h3>Valor Estoque</h3>

        <p id="valorEstoque">R$ 0,00</p>

      </div>

    </section>

    <!-- SEARCH -->

    <section class="search-area">

      <input
        type="text"
        id="buscarEstoque"
        placeholder="Buscar produto..."
      >

    </section>

    <!-- FILTERS -->

    <section class="filters">

    <button class="filter-btn active-filter" data-filter="todos">
        Todos
    </button>

    <button class="filter-btn" data-filter="baixo">
        Baixo Estoque
    </button>

    <button class="filter-btn" data-filter="zerado">
        Sem Estoque
    </button>

    <button class="filter-btn" data-filter="bebidas">
        Bebidas
    </button>

    <button class="filter-btn" data-filter="alimentos">
        Alimentos
    </button>

</section>

    <!-- TABLE -->

    <section class="table-section">

      <table>

        <thead>

          <tr>

            <th>Produto</th>

            <th>Categoria</th>

            <th>Quantidade</th>

            <th>Status</th>

            <th>Movimentação</th>

          </tr>

        </thead>

        <tbody id="listaEstoque">
        </tbody>

      </table>

    </section>

  </main>
  <script src="utils.js"></script>
  <script src="estoque.js"></script>
</body>
</html>
