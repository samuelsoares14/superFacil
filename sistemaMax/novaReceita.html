<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nova Receita | SuperMarket</title>

  <link rel="stylesheet" href="novoReceita.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <aside class="sidebar">

    <div class="logo">
      <h2>SuperMarket</h2>
    </div>

    <nav class="menu">
      <a href="/index.html">🏠 Início</a>
      <a href="/frenteCaixa.html">💳 Frente de Caixa</a>
      <a href="/receitasProducao.html">📋 Receitas / Produção</a>
      <a href="/produtos.html">🛒 Produtos</a>
      <a href="/estoque.html">📦 Estoque</a>
      <a href="/vendas.html">💰 Vendas</a>
      <a href="/cliente/clientes.html">👥 Clientes</a>
      <a href="/relatorios.html">📊 Relatórios</a>
      <a href="/configuracoes.html">⚙️ Configurações</a>
    </nav>

  </aside>

  <main class="container">

    <form class="form-receita" id="formReceita">

      <h1>Nova Receita</h1>

      <div class="grid">

        <div class="input-group">
          <label>Nome da Receita</label>
          <input
            type="text"
            id="nomeReceita"
            placeholder="Ex: Bolo de Chocolate"
          >
        </div>

        <div class="input-group">
          <label>Categoria</label>
          <select id="categoriaReceita">
            <option>Bolo</option>
            <option>Torta</option>
            <option>Mousse</option>
            <option>Doce</option>
            <option>Salgado</option>
          </select>
        </div>

        <div class="input-group full">
          <label>Foto da Receita</label>
          <input
            type="file"
            id="fotoReceita"
            accept="image/*"
          >
        </div>

      </div>

      <h2>Ingredientes</h2>

      <table class="ingredientes-table">

        <thead>
          <tr>
            <th>Ingrediente</th>
            <th>Quantidade</th>
            <th>Unidade</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody id="ingredientes">
        </tbody>

      </table>

      <button
        type="button"
        class="btn-add"
        id="btnAddIngrediente"
      >
        + Adicionar Ingrediente
      </button>

      <h2>Custos e Venda</h2>

      <div class="grid">

        <div class="input-group">
          <label>Custo da Receita (R$)</label>
          <input
            type="number"
            id="custoReceita"
            step="0.01"
            readonly
          >
        </div>

        <div class="input-group">
          <label>Margem de Lucro (%)</label>
          <input
            type="number"
            id="margemLucro"
            placeholder="50"
          >
        </div>

        <div class="input-group">
          <label>Preço de Venda (R$)</label>
          <input
            type="number"
            id="precoVenda"
            step="0.01"
            readonly
          >
        </div>

      </div>

      <div class="buttons">

        <button
          type="submit"
          class="btn-save"
        >
          Salvar Receita
        </button>

        <button
          type="button"
          class="btn-cancel"
          onclick="history.back()"
        >
          Cancelar
        </button>

      </div>

    </form>

  </main>

  <script src="novoReceita.js"></script>

</body>
</html>
